data:
  db_path: "data/gas_monitoring.db"
  csv_path: "data/cleaned_data.csv"
  table_name: "gas_monitoring"
  target_column: "Activity Level"
  drop_columns:
    - "Session ID"

preprocessing:
  numeric_impute_strategy: "median"
  categorical_impute_strategy: "most_frequent"

  outlier_handling:
    enabled: true
    method: "iqr"
    iqr_multiplier: 1.5

  remove_duplicates: true
  scale_features: true
  categorical_columns: []

split:
  test_size: 0.2
  random_state: 42
  stratify: true

resampling:
  method: "smote"
  random_state: 42

model:
  logistic_regression:
    max_iter: 1000
    random_state: 42
    C: 0.1 , 1.0 , 10.0
    solver: "lbfgs"
    class_weight: null

  random_forest:
    n_estimators: 1000
    max_depth: 70
    min_samples_split: 2
    min_samples_leaf: 1
    max_features: "sqrt"
    random_state: 42
    class_weight: "balanced"
    n_jobs: -1

  decision_tree:
    random_state: 16
    max_depth: null
    max_leaf_nodes: null
    max_features: null
    min_samples_leaf: 6
    class_weight: "balanced"

evaluation:
  primary_metric: "f1_weighted"
  average: "weighted"
  save_confusion_matrix: true
  save_feature_importance: true
  output_dir: "outputs"

  random_forest:
    confusion_matrix_path: "outputs/rf_confusion_matrix.png"
    feature_importance_path: "outputs/rf_feature_importance.png"

  decision_tree:
    primary_metric: "f1_macro"
    confusion_matrix_title: "Decision Tree Confusion Matrix"
    feature_importance_title: "Decision Tree Feature Importances"

output:
  model_dir: "saved_model"

  logistic_regression:
    model_path: "saved_model/logistic_regression_model.joblib"

  random_forest:
    model_path: "saved_model/rf_model.pkl"

  decision_tree:
    model_path: "saved_model/decision_tree_model.joblib"
